<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUNARA</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
<header class="site-header">
  <div class="header-inner">

    <!-- LEFT LOGO -->
    <div class="logo-left">
      <img src="images/lunara-website-logo.png" class="logo-main" />
    </div>

    <!-- CENTER BRAND -->
    <div class="brand-center">
      <h1>LUNARA</h1>
    </div>

    <!-- RIGHT -->
    <div class="header-right">
      <nav class="main-nav">
        <a href="#shop">Shop</a>
        <a href="#footer">About</a>
      </nav>

      <button class="cart-btn">
        Cart (<span id="cart-count">0</span>)
      </button>
    </div>

  </div>
</header>

  <!-- HERO -->
  <section class="hero">
    <div class="centered-hero-content">
      <h2>Streetwear with a cosmic soul.</h2>
      <p class="hero-copy">
        Discover oversized hoodies, expressive tees, and festival-ready pieces.
      </p>

      <div class="hero-actions">
        <a href="#shop" class="primary-btn">Shop Now</a>
        <span class="trust-badge">Free shipping over R75</span>
      </div>
    </div>
  </section>

  <!-- PRODUCTS -->
  <section id="shop" class="products"></section>

  <!-- FOOTER -->
  <footer id="footer" class="site-footer">
    <h4>LUNARA</h4>
    <p>Cosmic streetwear for dreamers.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
