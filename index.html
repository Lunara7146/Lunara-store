<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUNARA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<img src="images/lunara-logo.png" class="logo">

<h2 class="tagline">Born to Shine, Dressed to Wander</h2>

<div class="cart" onclick="openCart()">
🛒 Cart: <span id="cart-count">0</span>
</div>

</header>

<section class="hero">

<h1>LUNARA</h1>

<p>Trippy streetwear inspired by the moon, mushrooms, and cosmic freedom.</p>

<a href="#shop">
<button class="shop-btn">Shop Collection</button>
</a>

</section>

<section class="filters">

<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('hoodie')">Hoodies</button>
<button onclick="filterProducts('shirt')">T-Shirts</button>
<button onclick="filterProducts('pants')">Pants</button>

</section>

<section id="shop" class="products"></section>

<div id="cart-panel">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<h3>Total: <span id="cart-total">$0</span></h3>

<button onclick="closeCart()">Close</button>

</div>

<footer>

<p>© 2026 LUNARA</p>

</footer>

<script src="script.js"></script>

</body>
</html>
