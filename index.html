<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUNARA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Announcement -->
<div class="announcement">
Free shipping on orders over R1200 ✦ New cosmic drop live now
</div>

<header>
<img src="images/logo-small.png" class="logo">
<h2 class="tagline">Born to Shine, Dressed to Wander</h2>

<div class="cart" onclick="toggleCart()">
🛒 Cart (<span id="cart-count">0</span>)
</div>
</header>

<!-- HERO -->
<section class="hero">
<h1>LUNARA</h1>
<p>Trippy streetwear inspired by cosmic freedom.</p>
<button class="shop-btn" onclick="scrollToShop()">Shop Now</button>
</section>

<!-- FILTERS -->
<section class="filters">
<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('hoodie')">Hoodies</button>
<button onclick="filterProducts('shirt')">Shirts</button>
<button onclick="filterProducts('pants')">Pants</button>
</section>

<!-- PRODUCTS -->
<section id="shop" class="products"></section>

<!-- CART PANEL -->
<div id="cart-panel" class="cart-panel">
<h2>Your Cart</h2>

<div id="cart-items"></div>

<input id="promo-input" placeholder="Promo code">
<button onclick="applyPromo()">Apply</button>

<p id="discount-msg"></p>

<h3>Total: R<span id="cart-total">0</span></h3>

<button class="checkout-btn">Checkout</button>
</div>

<script src="script.js"></script>

</body>
</html>
