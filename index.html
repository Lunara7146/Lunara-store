<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lunara</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🌌 CINEMATIC LUNARA INTRO -->
  <div class="lunara-intro">
    <img src="images/lunara-moon-refined.png" class="moon">
    <img src="images/lunara-butterfly-refined.png" class="butterfly">
    <div class="sparkles"></div>
  </div>

  <!-- 🛍️ MAIN STORE CONTENT -->
  <header>
    <h1 class="logo-text">LUNARA</h1>
    <p class="tagline">Wear the glow. Become the energy.</p>
  </header>

  <section class="hero">
    <h2>Luxury Streetwear Redefined</h2>
    <p>Exclusive designs. Limited drops. Built to stand out.</p>
    <button class="shop-btn">Shop Now</button>
  </section>

  <section class="products" id="products">
    <!-- Your Printify products will load here -->
  </section>

  <!-- ⚡ SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
