<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Your Order - Lunara</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="tracking-page">
  <h1>Track Your Order</h1>

  <div class="tracking-box">
    <p><strong>Order ID:</strong> <span id="order-id"></span></p>

    <div class="tracking-status">
      <div class="step active">Order Received</div>
      <div class="step">In Production</div>
      <div class="step">Shipped</div>
    </div>

    <p class="tracking-note">
      You will receive tracking updates via email once your order ships.
    </p>
  </div>
</section>

<script>
  const params = new URLSearchParams(window.location.search);
  document.getElementById("order-id").innerText = params.get("orderId");
</script>

</body>
</html>
