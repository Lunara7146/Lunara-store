<!DOCTYPE html>
<html>
<head>
  <title>Lunara - Payment Success</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    // 🔥 Reliable order ID retrieval
    const urlParams = new URLSearchParams(window.location.search);

    let orderId =
      urlParams.get("m_payment_id") ||
      urlParams.get("custom_str9") ||
      localStorage.getItem("lunara_order_id");

    if (orderId) {
      // Clean up
      localStorage.removeItem("lunara_order_id");

      setTimeout(() => {
        window.location.href = `/track.html?orderId=${orderId}`;
      }, 1500);
    }
  </script>
</head>

<body style="background:#07070b; color:white; text-align:center; padding:80px;">

  <h1>✅ Payment Successful</h1>
  <p>Processing your order...</p>
  <p>Redirecting to tracking page...</p>

</body>
</html>
